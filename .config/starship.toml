# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

format = '$os$all${custom.slurm} $status$line_break$character'

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[python]
symbol = "\U000f0320 "

[os]
disabled = false

[os.symbols]
Debian = "\ue77d "
Macos = "\ue711 "
Ubuntu = "\uef72 "

[status]
disabled = false
symbol = "\uf467 "
sigint_symbol = "\ue009"

[hostname]
ssh_symbol = "@"
format = '[$ssh_symbol$hostname]($style) '

[username]
format = '[$user]($style)'

[custom.slurm]
command = '''c="/tmp/.slurm_gpu_max_$(id -u)"; [ -f "$c" ] && [ $(($(date +%s)-$(stat -c %Y "$c"))) -lt 3600 ] && max=$(<"$c") || { max=$(sacctmgr show user $(whoami) withassoc format=QOS -n -P 2>/dev/null | head -1 | xargs -I{} sacctmgr show qos {} format=MaxTRESPU -n -P 2>/dev/null | grep -oP "(?<=gres/gpu=)\d+"); echo "$max" > "$c"; }; jobs=$(squeue --me -h -o "%i %b" 2>/dev/null | while read id gres; do gpus=${gres##*:}; echo "#${id}󰢮${gpus}"; done | paste -sd "," -); echo "${jobs} /${max:-?}"'''
when = 'squeue --me -h | grep -q .'
format = '[$output]($style) '
style = 'bold green'
shell = ['bash', '--norc', '--noprofile']
ignore_timeout = true
