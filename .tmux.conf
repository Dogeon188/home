# https://hackmd.io/@lunzaizai/rJmSXfk-c#常用快捷建--指令

## Setup
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

## Theme

    set -g mouse on
    set -g default-terminal "tmux-256color"
    set-option -ga terminal-overrides ",xterm-256color:Tc"

    # Configure the catppuccin plugin
    set -g @catppuccin_flavor "mocha"
    set -g @catppuccin_window_status_style "rounded"

## Load Catppuccin theme before TPM plugins
    run ~/.tmux/plugins/tmux/catppuccin.tmux

## Preferences

    # Unshift session index if closed
    set -g renumber-windows on

    # tmux-resurrect restore session
    set -g @resurrect-capture-pane-contents 'on'

    # tmux-continuum auto-restore
    set -g @continuum-restore 'on'

    # Enable mouse scroll support
    set-option -g mouse on
    set-option -g history-limit 102400

    # Remove escape delay for Vim/Neovim
    set -sg escape-time 0

## Key Bindings

    # Letter case matters!

    # PREFIX + I => Install plugins

    # Ctrl + k => Clear history
    bind -n C-k clear-history

    # PREFIX + r => Reload tmux config
    bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

    # PREFIX + c => Create new window
    bind-key c new-window -c '#{pane_current_path}'

    # PREFIX + x => Kill current pane (no confirmation)
    bind-key x kill-pane

    # PREFIX + - => Split window vertically
    # PREFIX + | => Split window horizontally
    bind-key - split-window -v -c '#{pane_current_path}'
    bind-key | split-window -h -c '#{pane_current_path}'

    # PREFIX + left => move to prev window
    # PREFIX + right => move to next window
    bind-key -r left previous-window
    bind-key -r right next-window

    # PREFIX + j => Show pane list
    bind-key j choose-tree -swZ

## Plugins

    set -g @plugin 'tmux-plugins/tpm'
    # set -g @plugin 'tmux-plugins/tmux-sensible'
    set -g @plugin 'tmux-plugins/tmux-resurrect'
    set -g @plugin 'tmux-plugins/tmux-continuum'
    set -g @plugin 'tmux-plugins/tmux-yank'
    set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
    set -g @plugin 'tmux-plugins/tmux-cpu'
    set -g @plugin 'catppuccin/tmux#v2.3.0'

## Catppuccin theme (must be before tpm run)

    set-option -g status-position top
    set -g @catppuccin_date_time_color "#759bd7"
    set -g @catppuccin_flavor 'macchiato' # latte, frappe, macchiato or mocha
    set -g @catppuccin_window_current_text " #{pane_current_command}"
    set -g @catppuccin_window_text " #{b:pane_current_path}"
    set -g @catppuccin_status_background "#19151d"

    set -g  status-left-length 100
    set -g  status-right-length 150
    set -g  status-left ""
    set -g  status-right  "#{prefix_highlight}"
    set -agF status-right "#{E:@catppuccin_status_cpu}"
    set -agF status-right "#{E:@catppuccin_status_ram}"
    set -agF status-right "#{E:@catppuccin_status_gpu}"

    # Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
    run '~/.tmux/plugins/tpm/tpm'
